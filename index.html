<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 CLUB</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
    background: linear-gradient(135deg, #1a0000 0%, #000000 50%, #330000 100%);
    overflow: hidden;
}

.card {
    width: 350px;
    padding: 28px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 75, 92, 0.2);
    text-align: center;
    box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(255, 75, 92, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.title {
    font-size: 24px;
    font-weight: 800;
    color: #ff4b5c;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 0 20px rgba(255, 75, 92, 0.6);
}

/* LOGO IMAGE */
.logo-img{
width:80px;
height:80px;
border-radius:50%;
margin:0 auto 16px;
border:3px solid #ff4b5c;
box-shadow:0 0 25px rgba(255,75,92,0.5);
object-fit:cover;
}

.subtitle {
    font-size: 14px;
    color: #ff6b6b;
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
}

.timer {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    margin: 12px 0;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
}

.live {
    font-size: 13px;
    color: #ccc;
    margin-bottom: 22px;
    font-weight: 500;
}

.live span {
    color: #fbbf24;
    font-weight: 800;
}

.btn {
    display: block;
    padding: 15px 20px;
    margin: 10px 0;
    border-radius: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: none;
    cursor: pointer;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
}

.join {
    background: linear-gradient(135deg, #ff4b5c, #ff2e4d);
    box-shadow: 0 8px 25px rgba(255, 75, 92, 0.4);
}

.tradenova {
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    font-size: 13px;
}

.hack {
    background: linear-gradient(135deg, #ff00ff, #cc00cc);
    box-shadow: 0 8px 25px rgba(255, 0, 255, 0.4);
    font-size: 13px;
}

.vip {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #000;
    box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
}

/* Proofs Section - PERFECT LAYOUT */
.proofs-section {
    margin-top: 20px;
    padding: 18px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    border: 1px solid rgba(255, 75, 92, 0.2);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.proofs-title {
    font-size: 12px;
    color: #ff6b6b;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
}

.proofs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.proof-item {
    text-align: center;
}

.proof-thumb {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid #ff4b5c;
    box-shadow: 0 0 15px rgba(255, 75, 92, 0.5);
    margin-bottom: 6px;
    transition: all 0.3s ease;
    display: block;
    margin: 0 auto;
}

.proof-thumb:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255, 75, 92, 0.8);
}

.proof-label {
    font-size: 9px;
    color: #ff6b6b;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    line-height: 1.1;
}

.preview-btn {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: #000;
    font-size: 9px;
    padding: 6px 12px;
    border-radius: 8px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    width: 100%;
    box-shadow: 0 3px 12px rgba(0, 255, 136, 0.3);
}

.preview-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
}

.footer {
    margin-top: 16px;
    font-size: 11px;
    color: #888;
    font-weight: 500;
    letter-spacing: 0.3px;
}

/* Modal */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(15px);
    z-index: 9999;
}

.modal-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 92vw;
    max-width: 520px;
    height: 85vh;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(26, 0, 0, 0.9));
    border-radius: 24px;
    border: 3px solid #ff4b5c;
    box-shadow: 0 0 80px rgba(255, 75, 92, 0.7);
    padding: 35px 25px;
    text-align: center;
    animation: modalSlideIn 0.4s ease-out;
}

@keyframes modalSlideIn {
    from { transform: translate(-50%, -60%) scale(0.9); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.modal-title {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 25px;
    text-shadow: 0 0 25px rgba(255, 75, 92, 0.8);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.modal-image {
    width: 100%;
    height: 70%;
    max-height: 500px;
    object-fit: contain;
    border-radius: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
    opacity: 0;
    animation: imageFadeIn 0.6s ease-out 0.2s forwards;
}

@keyframes imageFadeIn {
    to { opacity: 1; }
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 25px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff4b5c, #ff2e4d);
    border: none;
    color: white;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255, 75, 92, 0.6);
    transition: all 0.3s ease;
}

.modal-close:hover {
    transform: scale(1.1) rotate(90deg);
    box-shadow: 0 0 40px rgba(255, 75, 92, 0.9);
}
</style>
</head>

<!-- MODAL -->
<div id="proofModal" class="modal-overlay" onclick="closeModal()">

<script>
let time = 30;
const telegramLink = "https://t.me/+VTJGdiRsF8djYzY1";

// Timer
setInterval(() => {
    let sec = time % 60;
    document.getElementById("timer").innerHTML = `00:${sec < 10 ? "0" : ""}${sec}`;
    if (time <= 0) {
        window.location.href = telegramLink;
    } else {
        time--;
    }
}, 1000);

// Live Users
setInterval(() => {
    let users = Math.floor(Math.random() * 80) + 180;
    document.getElementById("users").textContent = users;
}, 3000);

// Modal Functions
function openProof(imageSrc, title) {
    const modal = document.getElementById('proofModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    
    modalTitle.textContent = '⏳ Loading Proof...';
    modalImage.src = imageSrc;
    modalImage.style.opacity = '0';
    
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    
    modalImage.onload = () => {
        modalTitle.textContent = title;
        modalImage.style.opacity = '1';
    };
}

function closeModal() {
    const modal = document.getElementById('proofModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Close on ESC
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// Close on overlay click
document.getElementById('proofModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});
</script>
